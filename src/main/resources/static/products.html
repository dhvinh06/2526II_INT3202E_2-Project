<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Danh sách sản phẩm – ShopVN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#1a1a2e}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}

/* HEADER */
header{background:#fff;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.hd{max-width:1300px;margin:auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-box{width:34px;height:34px;background:#FF6B2C;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:20px;height:20px;fill:#fff}
.logo-text{font-size:18px;font-weight:800;color:#FF6B2C}
.srch{flex:1;max-width:480px;position:relative}
.srch input{width:100%;padding:9px 38px 9px 14px;border:1.5px solid #e8e8e8;border-radius:22px;font-size:14px;font-family:inherit;outline:none;background:#f9f9f9;transition:border-color .2s,box-shadow .2s}
.srch input:focus{border-color:#FF6B2C;box-shadow:0 0 0 3px rgba(255,107,44,.1);background:#fff}
.srch svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.hd-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.btn-login{padding:7px 16px;background:#FF6B2C;color:#fff;border:none;border-radius:18px;font-size:13px;font-weight:600;box-shadow:0 3px 10px rgba(255,107,44,.3)}
.btn-login:hover{background:#e85c1f}

/* LAYOUT */
.page{max-width:1300px;margin:24px auto;padding:0 20px;display:flex;gap:22px;align-items:flex-start}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:78px}
.sb-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.sb-title button{font-size:12px;color:#FF6B2C;background:none;border:none;font-weight:600}
.sb-section{margin-bottom:20px;border-bottom:1px solid #f0f0f0;padding-bottom:18px}
.sb-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sb-label{font-size:13px;font-weight:700;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.cat-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer}
.cat-item input[type=checkbox]{accent-color:#FF6B2C;width:15px;height:15px}
.cat-item label{font-size:13.5px;cursor:pointer;flex:1}
.cat-item span{font-size:11.5px;color:#aaa;background:#f5f5f5;padding:1px 7px;border-radius:10px}
/* Range */
.range-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px}
input[type=range]{width:100%;accent-color:#FF6B2C;height:4px}
.price-display{text-align:center;font-size:13px;font-weight:600;color:#FF6B2C;margin-top:8px}
/* Sort */
.sort-opts{display:flex;flex-direction:column;gap:7px}
.sort-opt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13.5px}
.sort-opt input[type=radio]{accent-color:#FF6B2C;width:15px;height:15px}

/* MAIN */
.main{flex:1;min-width:0}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.result-count{font-size:14px;color:#666}
.result-count b{color:#1a1a2e}
.filter-toggle{display:none;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1.5px solid #e8e8e8;border-radius:8px;font-size:13.5px;font-weight:600}
.filter-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.no-res{grid-column:1/-1;text-align:center;color:#aaa;padding:60px 0;font-size:15px}

/* CARD */
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:transform .22s,box-shadow .22s;position:relative;cursor:pointer}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(0,0,0,.12)}
.card-img{aspect-ratio:1/1;overflow:hidden;background:#f0f0f0;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.card:hover .card-img img{transform:scale(1.07)}
.badge-discount{position:absolute;top:10px;left:10px;background:#FF6B2C;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;z-index:1}
.quick-view{position:absolute;bottom:0;left:0;right:0;background:rgba(26,26,46,.85);color:#fff;border:none;padding:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .22s;letter-spacing:.3px}
.card:hover .quick-view{opacity:1}
.card-body{padding:12px}
.card-name{font-size:13.5px;font-weight:600;line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#1a1a2e}
.card-prices{display:flex;align-items:baseline;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.price-sale{font-size:15px;font-weight:800;color:#FF6B2C}
.price-orig{font-size:12px;color:#bbb;text-decoration:line-through}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#888}
.stars{color:#f5a623}
.sold{color:#aaa}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:28px;flex-wrap:wrap}
.pg-btn{width:36px;height:36px;border:1.5px solid #e8e8e8;background:#fff;border-radius:8px;font-size:13.5px;font-weight:600;color:#555;transition:all .18s}
.pg-btn:hover,.pg-btn.active{background:#FF6B2C;border-color:#FF6B2C;color:#fff}

/* OVERLAY / DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300}
.overlay.open{display:block}
.drawer{position:fixed;left:-280px;top:0;bottom:0;width:270px;background:#fff;z-index:301;overflow-y:auto;padding:20px;transition:left .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 20px rgba(0,0,0,.15)}
.drawer.open{left:0}
.drawer-close{background:none;border:none;font-size:22px;float:right;color:#888;margin-bottom:8px}

/* RESPONSIVE */
@media(max-width:1050px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){
  .sidebar{display:none}
  .filter-toggle{display:flex}
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}}
</style>
</head>
<body>

<header>
  <div class="hd">
    <a href="index.html" class="logo">
      <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59L5.25 14c-.16.28-.25.61-.25.96C5 16.1 5.9 17 7 17h14v-2H7.42a.25.25 0 0 1-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 23.46 4H5.21l-.94-2H1z"/></svg></div>
      <span class="logo-text">ShopVN</span>
    </a>
    <div class="srch">
      <input id="hd-search" type="text" placeholder="Tìm kiếm sản phẩm..."/>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="hd-right">
      <button class="btn-login" onclick="location.href='auth.html'">Đăng nhập</button>
    </div>
  </div>
</header>

<div class="page">
  <!-- Sidebar desktop -->
  <aside class="sidebar" id="sidebar-desktop">
    <div id="sb-content"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="toolbar">
      <div class="result-count" id="result-count"></div>
      <button class="filter-toggle" id="filter-toggle-btn" onclick="openDrawer()">
        <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Bộ lọc
      </button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Mobile drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="sb-drawer"></div>
</div>

<script>
const CATS = [
  {id:'all',name:'Tất cả',count:12},
  {id:'fashion',name:'Thời trang',count:4},
  {id:'electronics',name:'Điện tử',count:3},
  {id:'home',name:'Gia dụng',count:2},
  {id:'beauty',name:'Làm đẹp',count:2},
  {id:'books',name:'Sách',count:1}
];

const PRODUCTS = [
  {id:1,name:'Áo thun nam basic oversize Hàn Quốc',cat:'fashion',price:149000,orig:220000,rating:4.8,sold:2104,img:'https://picsum.photos/seed/pr1/400/400'},
  {id:2,name:'Váy hoa maxi dáng dài nữ tính',cat:'fashion',price:289000,orig:420000,rating:4.7,sold:856,img:'https://picsum.photos/seed/pr2/400/400'},
  {id:3,name:'Quần jean nam slim fit co giãn',cat:'fashion',price:320000,orig:480000,rating:4.6,sold:432,img:'https://picsum.photos/seed/pr3/400/400'},
  {id:4,name:'Áo khoác hoodie unisex form rộng',cat:'fashion',price:380000,orig:550000,rating:4.9,sold:1230,img:'https://picsum.photos/seed/pr4/400/400'},
  {id:5,name:'Tai nghe Bluetooth ANC chống ồn',cat:'electronics',price:890000,orig:1290000,rating:4.7,sold:687,img:'https://picsum.photos/seed/pr5/400/400'},
  {id:6,name:'Đồng hồ thông minh đo sức khoẻ',cat:'electronics',price:1250000,orig:1890000,rating:4.5,sold:312,img:'https://picsum.photos/seed/pr6/400/400'},
  {id:7,name:'Loa Bluetooth mini chống nước IPX7',cat:'electronics',price:450000,orig:680000,rating:4.8,sold:920,img:'https://picsum.photos/seed/pr7/400/400'},
  {id:8,name:'Bình giữ nhiệt inox 316 500ml',cat:'home',price:245000,orig:320000,rating:4.9,sold:3102,img:'https://picsum.photos/seed/pr8/400/400'},
  {id:9,name:'Nồi chiên không dầu 5L digital',cat:'home',price:1490000,orig:2200000,rating:4.6,sold:445,img:'https://picsum.photos/seed/pr9/400/400'},
  {id:10,name:'Bộ dưỡng da 5 bước cho da dầu',cat:'beauty',price:450000,orig:650000,rating:4.7,sold:780,img:'https://picsum.photos/seed/pr10/400/400'},
  {id:11,name:'Son môi matte lì 24h siêu bền màu',cat:'beauty',price:120000,orig:185000,rating:4.8,sold:5200,img:'https://picsum.photos/seed/pr11/400/400'},
  {id:12,name:'Sách Đắc Nhân Tâm bản mới 2024',cat:'books',price:78000,orig:95000,rating:4.9,sold:8900,img:'https://picsum.photos/seed/pr12/400/400'}
];

const PAGE_SIZE = 8;
let state = { cat:'all', maxPrice:2500000, sort:'newest', search:'', page:1 };

const fmt = n => new Intl.NumberFormat('vi-VN').format(n) + '₫';
const disc = (s,o) => Math.round((1-s/o)*100);
const starsHtml = r => '<span class="stars">' + '★'.repeat(Math.round(r)) + '</span>';

function filtered(){
  let list = PRODUCTS.filter(p=>{
    if(state.cat !== 'all' && p.cat !== state.cat) return false;
    if(p.price > state.maxPrice) return false;
    if(state.search && !p.name.toLowerCase().includes(state.search.toLowerCase())) return false;
    return true;
  });
  if(state.sort==='price-asc') list.sort((a,b)=>a.price-b.price);
  else if(state.sort==='price-desc') list.sort((a,b)=>b.price-a.price);
  else if(state.sort==='bestseller') list.sort((a,b)=>b.sold-a.sold);
  else list.sort((a,b)=>b.id-a.id);
  return list;
}

function renderSidebar(target){
  const catHtml = CATS.map(c=>`
    <div class="cat-item">
      <input type="checkbox" id="cat-${c.id}-${target}" ${state.cat===c.id||c.id==='all'&&state.cat==='all'?'checked':''} onchange="setCat('${c.id}')"/>
      <label for="cat-${c.id}-${target}">${c.name}</label>
      <span>${c.count}</span>
    </div>`).join('');

  const sortHtml = [
    {v:'newest',l:'Mới nhất'},{v:'bestseller',l:'Bán chạy nhất'},
    {v:'price-asc',l:'Giá tăng dần'},{v:'price-desc',l:'Giá giảm dần'}
  ].map(s=>`
    <label class="sort-opt">
      <input type="radio" name="sort-${target}" value="${s.v}" ${state.sort===s.v?'checked':''} onchange="setSort('${s.v}')"/>
      ${s.l}
    </label>`).join('');

  return `
    <div class="sb-title">Bộ lọc <button onclick="resetFilter()">Xoá tất cả</button></div>
    <div class="sb-section">
      <div class="sb-label">Danh mục</div>
      ${catHtml}
    </div>
    <div class="sb-section">
      <div class="sb-label">Khoảng giá</div>
      <div class="range-row"><span>0₫</span><span>2.5tr₫</span></div>
      <input type="range" min="0" max="2500000" step="50000" value="${state.maxPrice}" oninput="setPrice(this.value)"/>
      <div class="price-display" id="price-disp-${target}">Tối đa: ${fmt(state.maxPrice)}</div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Sắp xếp</div>
      <div class="sort-opts">${sortHtml}</div>
    </div>`;
}

function renderGrid(){
  const list = filtered();
  const total = list.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  if(state.page > pages) state.page = 1;
  const slice = list.slice((state.page-1)*PAGE_SIZE, state.page*PAGE_SIZE);

  document.getElementById('result-count').innerHTML = `Hiển thị <b>${slice.length}</b> / <b>${total}</b> sản phẩm`;

  const grid = document.getElementById('grid');
  if(!slice.length){ grid.innerHTML='<div class="no-res">😕 Không tìm thấy sản phẩm phù hợp.</div>'; document.getElementById('pagination').innerHTML=''; return; }

  grid.innerHTML = slice.map(p=>`
    <div class="card" onclick="alert('Xem chi tiết sản phẩm: ${p.name.replace(/'/g,"\\'")}')">
      <div class="card-img">
        <span class="badge-discount">-${disc(p.price,p.orig)}%</span>
        <img src="${p.img}" alt="${p.name}" loading="lazy"/>
        <button class="quick-view" onclick="event.stopPropagation();alert('Xem nhanh: ${p.name.replace(/'/g,"\\'")}')">👁 Xem nhanh</button>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-prices">
          <span class="price-sale">${fmt(p.price)}</span>
          <span class="price-orig">${fmt(p.orig)}</span>
        </div>
        <div class="card-meta">
          <span>${starsHtml(p.rating)} ${p.rating}</span>
          <span class="sold">Đã bán ${p.sold.toLocaleString()}</span>
        </div>
      </div>
    </div>`).join('');

  // Pagination
  const pg = document.getElementById('pagination');
  if(pages <= 1){ pg.innerHTML=''; return; }
  let html = '';
  if(state.page>1) html+=`<button class="pg-btn" onclick="goPg(${state.page-1})">‹</button>`;
  for(let i=1;i<=pages;i++) html+=`<button class="pg-btn${i===state.page?' active':''}" onclick="goPg(${i})">${i}</button>`;
  if(state.page<pages) html+=`<button class="pg-btn" onclick="goPg(${state.page+1})">›</button>`;
  pg.innerHTML = html;
}

function refresh(){
  document.getElementById('sb-content').innerHTML = renderSidebar('d');
  document.getElementById('sb-drawer').innerHTML = renderSidebar('m');
  renderGrid();
}

function setCat(c){ state.cat=c; state.page=1; refresh(); }
function setSort(s){ state.sort=s; state.page=1; refresh(); }
function setPrice(v){
  state.maxPrice=+v; state.page=1;
  document.querySelectorAll('[id^="price-disp-"]').forEach(el=>el.textContent='Tối đa: '+fmt(+v));
  renderGrid();
}
function goPg(p){ state.page=p; renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); }
function resetFilter(){ state={...state,cat:'all',maxPrice:2500000,sort:'newest',page:1}; refresh(); }

function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

document.getElementById('hd-search').addEventListener('input',function(){ state.search=this.value; state.page=1; renderGrid(); });

refresh();
</script>
</body>
</html>
